<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fake Product Review Detection</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(135deg,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:700px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#243b55;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

textarea{
    width:100%;
    height:180px;
    border:2px solid #ddd;
    border-radius:12px;
    padding:15px;
    font-size:16px;
    resize:none;
}

textarea:focus{
    outline:none;
    border-color:#243b55;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#243b55;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1a2d44;
}

.result{
    margin-top:25px;
    padding:15px;
    border-radius:12px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.genuine{
    background:#d4edda;
    color:#155724;
}

.fake{
    background:#f8d7da;
    color:#721c24;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#777;
    font-size:14px;
}
</style>

</head>

<body>

<div class="container">

    <h1>🔍 Fake Product Review Detection</h1>

    <p class="subtitle">
        Enter a product review and let our NLP model analyze it.
    </p>

    <form method="POST">

        <textarea
            name="review"
            placeholder="Example: This product changed my life! Best purchase ever..."
            required></textarea>

        <button type="submit">
            Analyze Review
        </button>

    </form>

    {% if prediction %}

        {% if prediction == "Genuine Review" %}
            <div class="result genuine">
                ✅ Genuine Review
            </div>
        {% else %}
            <div class="result fake">
                ❌ Fake Review
            </div>
        {% endif %}

    {% endif %}

    <div class="footer">
        Powered by NLP • TF-IDF • Logistic Regression
    </div>

</div>

</body>
</html>
